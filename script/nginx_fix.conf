# === nginx 修复配置 ===
# 问题：原来的 location /assets/ 使用 rewrite 重定向到 /static/，导致找不到文件
# 修复：移除 /assets/ 重定向，让 nginx 的 root 指令自然处理
#
# 需要删除或注释掉 nginx 配置中的这段：
#
#   # Redirect old /assets/ paths to /static/
#   location /assets/ {
#       rewrite ^/assets/(.*)$ /static/$1 permanent;
#   }
#
# 因为 root 已经设置为 /www/wwwroot/anti_course/static;
# 请求 /assets/XXX.js 会自动找到 /www/wwwroot/anti_course/static/assets/XXX.js
#
# 同时删除不再需要的 /v2/ 和 /v3/ location 块和 /static/assets/ 重定向
#
# 部署步骤：
# 1. SSH 到服务器
# 2. 编辑 /www/server/panel/vhost/nginx/shuakecdcas.top.conf
# 3. 删除以下 location 块：
#    - location /v2/ { ... }
#    - location /static/assets/ { ... }
#    - location /assets/ { ... }
# 4. 保留 location /static/ { ... } 块（用于其他静态文件）
# 5. nginx -t && nginx -s reload
# 6. 上传 static/ 目录到服务器
